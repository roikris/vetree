name: Daily Security Monitoring

on:
  schedule:
    # Run at 6 AM UTC every day
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  vulnerability-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
      issues: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run comprehensive security audit
      id: audit
      run: |
        echo "=== Running NPM Audit ===" 
        npm audit --audit-level=low --json > npm-audit.json || true
        
        echo "=== Checking for outdated packages ===" 
        npm outdated --json > outdated-packages.json || true
        
        echo "=== Generating security report ===" 
        cat > security-report.md << EOF
        # Daily Security Report - $(date -u +"%Y-%m-%d")
        
        ## NPM Audit Results
        \`\`\`json
        $(cat npm-audit.json | jq '.' || echo "No audit data")
        \`\`\`
        
        ## Outdated Packages
        \`\`\`json
        $(cat outdated-packages.json | jq '.' || echo "No outdated packages")
        \`\`\`
        
        ## Recommendations
        - Review and update vulnerable dependencies
        - Consider updating outdated packages
        - Monitor for new security advisories
        EOF
        
        # Check if vulnerabilities exist
        if [ -s npm-audit.json ]; then
          VULN_COUNT=$(cat npm-audit.json | jq '.metadata.vulnerabilities.total // 0')
          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "vulnerabilities_found=true" >> $GITHUB_OUTPUT
            echo "vulnerability_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          else
            echo "vulnerabilities_found=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "vulnerabilities_found=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload security artifacts
      uses: actions/upload-artifact@v4
      with:
        name: daily-security-report-${{ github.run_number }}
        path: |
          npm-audit.json
          outdated-packages.json
          security-report.md
        retention-days: 90

    - name: Create security issue for vulnerabilities
      if: steps.audit.outputs.vulnerabilities_found == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const auditData = JSON.parse(fs.readFileSync('npm-audit.json', 'utf8'));
          
          const title = `🚨 Security Vulnerabilities Detected - ${new Date().toISOString().split('T')[0]}`;
          const body = `
          # Security Alert: Vulnerabilities Found
          
          Our daily security scan has detected **${{ steps.audit.outputs.vulnerability_count }}** vulnerabilities in our dependencies.
          
          ## Summary
          - **Total Vulnerabilities:** ${{ steps.audit.outputs.vulnerability_count }}
          - **Scan Date:** ${new Date().toISOString()}
          - **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          ## Next Steps
          1. 🔍 Review the detailed audit results in the workflow artifacts
          2. 🛠️ Run \`npm audit fix\` to automatically fix vulnerabilities
          3. 📦 Manually update dependencies that cannot be auto-fixed
          4. ✅ Verify fixes by running \`npm audit\` again
          5. 🔄 Re-run this workflow to confirm resolution
          
          ## Quick Commands
          \`\`\`bash
          # Fix automatically fixable vulnerabilities
          npm audit fix
          
          # View detailed audit report
          npm audit
          
          # Update specific package (example)
          npm update package-name
          \`\`\`
          
          **⚠️ This issue was automatically created by our security monitoring system.**
          `;
          
          // Check if a similar issue already exists
          const existingIssues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: 'security,vulnerability,automated',
            state: 'open'
          });
          
          const existingSecurityIssue = existingIssues.data.find(issue => 
            issue.title.includes('Security Vulnerabilities Detected')
          );
          
          if (!existingSecurityIssue) {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'vulnerability', 'urgent', 'automated'],
              assignees: [] // Add team members who should be notified
            });
          } else {
            // Update existing issue with new information
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existingSecurityIssue.number,
              body: `## Updated Security Scan Results - ${new Date().toISOString().split('T')[0]}
              
              New vulnerabilities detected: **${{ steps.audit.outputs.vulnerability_count }}**
              
              Please check the latest workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            });
          }

    - name: Post success notification
      if: steps.audit.outputs.vulnerabilities_found == 'false'
      run: |
        echo "✅ Daily security scan completed successfully - no vulnerabilities found!"
        echo "Scan date: $(date -u)"
        echo "All dependencies are secure! 🛡️"