name: Security Incident Response

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      severity:
        description: 'Incident Severity'
        required: true
        default: 'medium'
        type: choice
        options:
        - critical
        - high
        - medium
        - low
      description:
        description: 'Incident Description'
        required: true
        type: string

jobs:
  security-incident-response:
    runs-on: ubuntu-latest
    if: contains(github.event.label.name, 'security') && contains(github.event.label.name, 'urgent')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create security incident tracking
      uses: actions/github-script@v7
      with:
        script: |
          const incidentNumber = `SEC-${Date.now()}`;
          const severity = '${{ github.event.inputs.severity }}' || 'high';
          const description = '${{ github.event.inputs.description }}' || 'Security vulnerability detected in automated scan';
          
          // Create incident response checklist
          const checklistBody = `
          # 🚨 Security Incident Response Checklist
          
          **Incident ID:** ${incidentNumber}
          **Severity:** ${severity.toUpperCase()}
          **Created:** ${new Date().toISOString()}
          **Reporter:** @${{ github.actor }}
          
          ## Incident Details
          ${description}
          
          ## Response Checklist
          
          ### Immediate Actions (0-2 hours)
          - [ ] Acknowledge incident receipt
          - [ ] Assess severity and impact
          - [ ] Alert security team
          - [ ] Document initial findings
          - [ ] Determine if production is affected
          
          ### Investigation (2-8 hours)
          - [ ] Identify root cause
          - [ ] Assess scope of vulnerability
          - [ ] Check for signs of exploitation
          - [ ] Document affected systems/versions
          - [ ] Gather evidence
          
          ### Mitigation (8-24 hours)
          - [ ] Implement immediate fixes
          - [ ] Deploy patches if needed
          - [ ] Update dependencies
          - [ ] Verify fix effectiveness
          - [ ] Update monitoring/alerts
          
          ### Communication
          - [ ] Notify stakeholders
          - [ ] Update security advisory
          - [ ] Prepare public disclosure (if needed)
          - [ ] Update documentation
          
          ### Follow-up
          - [ ] Conduct post-incident review
          - [ ] Update security processes
          - [ ] Schedule follow-up security audit
          - [ ] Update training materials
          - [ ] Close incident
          
          ## Timeline
          - **Detected:** ${new Date().toISOString()}
          - **Acknowledged:** 
          - **Mitigated:** 
          - **Resolved:** 
          - **Reviewed:** 
          
          ## Contacts
          - **Incident Commander:** TBD
          - **Technical Lead:** TBD
          - **Communications Lead:** TBD
          
          ---
          
          **Auto-generated incident response for issue #${{ github.event.issue.number }}**
          `;
          
          // Create new issue for incident tracking
          const incident = await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `[${incidentNumber}] Security Incident Response - ${severity.toUpperCase()}`,
            body: checklistBody,
            labels: ['security-incident', 'response', `severity-${severity}`, 'tracking']
          });
          
          // Link original issue to incident
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: ${{ github.event.issue.number }},
            body: `🚨 **Security Incident Response Initiated**
            
            This security issue has triggered our incident response process.
            
            **Incident Tracking Issue:** #${incident.data.number}
            **Incident ID:** ${incidentNumber}
            **Severity:** ${severity.toUpperCase()}
            
            Please follow the response checklist in the tracking issue.`
          });

    - name: Run emergency security scan
      if: github.event.inputs.severity == 'critical' || github.event.inputs.severity == 'high'
      run: |
        echo "Running emergency security scan..."
        
        # Setup Node.js for scanning
        curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
        sudo apt-get install -y nodejs
        
        # Install dependencies and run comprehensive scan
        npm ci
        
        echo "=== Emergency NPM Audit ===" 
        npm audit --audit-level=low --json > emergency-audit.json || true
        
        echo "=== Checking for critical vulnerabilities ===" 
        if [ -s emergency-audit.json ]; then
          CRITICAL_COUNT=$(cat emergency-audit.json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH_COUNT=$(cat emergency-audit.json | jq '.metadata.vulnerabilities.high // 0')
          
          echo "Critical vulnerabilities: $CRITICAL_COUNT"
          echo "High vulnerabilities: $HIGH_COUNT"
          
          if [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
            echo "EMERGENCY: Critical/High vulnerabilities detected!"
            echo "::warning::Emergency security scan found critical vulnerabilities"
          fi
        fi

    - name: Upload emergency scan results
      uses: actions/upload-artifact@v4
      with:
        name: emergency-security-scan-${{ github.run_number }}
        path: emergency-audit.json
        retention-days: 90

  auto-patch-critical:
    runs-on: ubuntu-latest
    if: github.event.inputs.severity == 'critical'
    needs: security-incident-response
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Attempt automatic patching
      run: |
        echo "Attempting automatic security patching..."
        npm ci
        npm audit fix --force || echo "Auto-fix completed with warnings"

    - name: Create emergency patch PR
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "security: emergency patch for critical vulnerability"
        title: "🚨 EMERGENCY: Security patch for critical vulnerability"
        body: |
          ## Emergency Security Patch
          
          This PR was automatically created in response to a critical security incident.
          
          **Incident:** Security vulnerability requiring immediate patching
          **Severity:** CRITICAL
          **Action:** Automated dependency updates to address vulnerabilities
          
          ### Changes Made
          - Automatic `npm audit fix` applied
          - Dependencies updated to secure versions
          
          ### Review Required
          - [ ] Verify all vulnerabilities are addressed
          - [ ] Test critical application functionality
          - [ ] Confirm no breaking changes introduced
          - [ ] Merge immediately if tests pass
          
          **This is an emergency patch - review and merge ASAP!**
        branch: security/emergency-patch-${{ github.run_number }}
        labels: |
          security
          critical
          emergency
          auto-patch
        reviewers: security-team