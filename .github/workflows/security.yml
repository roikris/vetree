name: Security Audit

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security audit daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      run: |
        echo "Running npm audit..."
        npm audit --audit-level=moderate --json > audit-results.json || true
        
        # Check if there are vulnerabilities
        if [ -s audit-results.json ] && [ "$(cat audit-results.json | jq '.vulnerabilities | length')" -gt 0 ]; then
          echo "Vulnerabilities found!"
          npm audit --audit-level=moderate
          exit 1
        else
          echo "No vulnerabilities found."
        fi

    - name: Upload audit results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: audit-results
        path: audit-results.json
        retention-days: 30

  license-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install license-checker
      run: npm install -g license-checker

    - name: Install dependencies
      run: npm ci

    - name: Check licenses
      run: |
        echo "Checking licenses..."
        license-checker --onlyAllow 'MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;Unlicense' --production --json > licenses.json
        echo "License check completed successfully"

    - name: Upload license results
      uses: actions/upload-artifact@v4
      with:
        name: license-results
        path: licenses.json
        retention-days: 30

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Dependency Review
      uses: actions/dependency-review-action@v4
      with:
        fail-on-severity: moderate
        allow-licenses: MIT, ISC, Apache-2.0, BSD-2-Clause, BSD-3-Clause, 0BSD, CC0-1.0, Unlicense

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Snyk CLI
      run: npm install -g snyk

    - name: Install dependencies
      run: npm ci

    - name: Run Snyk security scan
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: |
        if [ -n "$SNYK_TOKEN" ]; then
          echo "Running Snyk security scan..."
          snyk auth $SNYK_TOKEN
          snyk test --severity-threshold=medium --json > snyk-results.json || true
          if [ -s snyk-results.json ]; then
            echo "Snyk scan completed, uploading results..."
          fi
        else
          echo "SNYK_TOKEN not configured, skipping Snyk scan"
        fi

    - name: Upload Snyk results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: snyk-results
        path: snyk-results.json
        retention-days: 30

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: [dependency-audit, license-check, security-scan]
    if: failure() && github.ref == 'refs/heads/main'
    steps:
    - name: Create GitHub Issue on Security Failure
      uses: actions/github-script@v7
      with:
        script: |
          const title = `Security Audit Failed - ${new Date().toISOString().split('T')[0]}`;
          const body = `
          ## Security Audit Failure
          
          The security audit workflow has failed on the main branch.
          
          **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Commit:** ${{ github.sha }}
          **Timestamp:** ${new Date().toISOString()}
          
          Please review the audit results and address any security vulnerabilities immediately.
          
          ### Next Steps:
          1. Review the workflow logs for detailed information
          2. Check the uploaded audit artifacts
          3. Update vulnerable dependencies
          4. Verify fixes with another audit run
          
          This issue was automatically created by the security workflow.
          `;
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: title,
            body: body,
            labels: ['security', 'vulnerability', 'urgent']
          });