name: Growth OS Daily Reminder (DEPRECATED)

# DEPRECATED: Daily tasks replaced by Content Agent (on-demand content generation)
# Kept for reference only - cron trigger disabled
# The growth_tasks table still exists but is no longer actively used

on:
  # schedule:
  #   # Runs every day at 3:00 AM UTC (6:00 AM Israel time, UTC+3)
  #   - cron: '0 3 * * *'
  workflow_dispatch: # Kept for manual testing if needed

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js
        working-directory: .github/workflows

      - name: Send daily reminder
        run: node scripts/growth-daily-reminder.js
        working-directory: .github/workflows
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
