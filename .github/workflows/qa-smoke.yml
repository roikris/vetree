name: QA Smoke Suite

on:
  schedule:
    - cron: '0 6 * * *'   # Daily 06:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # On push: wait for Vercel to finish deploying (pragmatic 120s; not a guaranteed window)
      - name: Wait for Vercel deploy
        if: github.event_name == 'push'
        run: sleep 120

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        id: smoke
        run: npm run test:smoke
        continue-on-error: true
        env:
          SMOKE_BASE_URL: https://vetree.app
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Triage + Slack
        if: always()
        run: node scripts/qa-triage.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRIGGER: ${{ github.event_name }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Fail job if tests failed
        if: steps.smoke.outcome == 'failure'
        run: exit 1
