name: QA Smoke Tests — Daily

on:
  schedule:
    # 06:00 UTC daily — after the 02:00 enrichment run, before the 06:00 PubMed sync
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        id: smoke
        run: npx playwright test
        continue-on-error: true
        env:
          BASE_URL: https://vetree.app

      - name: Upload test artifacts
        # Always upload so screenshots/traces are available even on pass (useful for debugging flaky tests)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-results.json
            playwright-report/
            test-results/
          retention-days: 14

      - name: Triage failures and report to Slack
        if: always()
        run: node scripts/qa-report.mjs
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_OUTCOME: ${{ steps.smoke.outcome }}
